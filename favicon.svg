<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B6EF6"/>
      <stop offset="100%" stop-color="#5B4CF5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <!-- S letterform in Instrument Serif italic style -->
  <text x="16" y="23" text-anchor="middle"
    font-family="Georgia, serif"
    font-style="italic"
    font-size="22"
    font-weight="400"
    fill="white"
    letter-spacing="-0.5">S</text>
  <!-- small score dot indicator bottom right -->
  <circle cx="25" cy="25" r="3.5" fill="#22C55E"/>
</svg>
